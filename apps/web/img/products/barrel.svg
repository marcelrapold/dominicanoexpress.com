<svg viewBox="0 0 80 116" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0A3678"/>
      <stop offset="28%"  stop-color="#1565C0"/>
      <stop offset="55%"  stop-color="#5BA4E8"/>
      <stop offset="82%"  stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0A3678"/>
    </linearGradient>
    <linearGradient id="botGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#072B60"/>
      <stop offset="50%"  stop-color="#1356A8"/>
      <stop offset="100%" stop-color="#072B60"/>
    </linearGradient>
    <linearGradient id="collarGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#111"/>
      <stop offset="40%"  stop-color="#555"/>
      <stop offset="60%"  stop-color="#333"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
  </defs>

  <!-- Body -->
  <rect x="4" y="20" width="72" height="86" rx="5" fill="url(#bodyGrad)"/>

  <!-- Reinforcement band top -->
  <rect x="4" y="38" width="72" height="8" rx="1" fill="rgba(0,0,0,0.28)"/>
  <!-- Reinforcement band middle -->
  <rect x="4" y="62" width="72" height="8" rx="1" fill="rgba(0,0,0,0.22)"/>
  <!-- Reinforcement band bottom -->
  <rect x="4" y="84" width="72" height="8" rx="1" fill="rgba(0,0,0,0.28)"/>

  <!-- Body highlight (left edge shimmer) -->
  <rect x="10" y="21" width="4" height="84" rx="2" fill="rgba(255,255,255,0.09)"/>

  <!-- Bottom cap ellipse -->
  <ellipse cx="40" cy="106" rx="36" ry="9" fill="url(#botGrad)"/>

  <!-- Top collar (black ring) -->
  <ellipse cx="40" cy="20" rx="36" ry="9" fill="url(#collarGrad)"/>
  <!-- Inner collar recess -->
  <ellipse cx="40" cy="18" rx="30" ry="7" fill="#1e1e1e"/>
  <!-- Cap seat -->
  <ellipse cx="40" cy="16" rx="22" ry="5.5" fill="#161616"/>
  <!-- Screw cap -->
  <circle  cx="40" cy="15" r="14" fill="url(#capGrad)"/>
  <circle  cx="40" cy="15" r="10" fill="#252525"/>
  <!-- Cap knurling lines -->
  <circle  cx="40" cy="15" r="7"  fill="none" stroke="#444" stroke-width="1.2" stroke-dasharray="3 2"/>
  <circle  cx="40" cy="15" r="4"  fill="#1a1a1a"/>
</svg>
