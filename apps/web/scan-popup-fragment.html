<!-- ID Scanner Popup (Sub-App) -->
<div id="scan-popup-root" class="scan-popup-root" hidden aria-hidden="true">
  <div class="scan-popup-backdrop" id="scan-popup-backdrop" tabindex="-1" aria-hidden="true"></div>
  <div id="scanner" class="scan-popup-panel" role="dialog" aria-modal="true" aria-labelledby="scan-popup-heading">
    <div class="scan-popup-topbar">
      <span id="scan-popup-heading" class="scan-popup-title" data-i18n="scan_section_title">ID Scanner</span>
      <button type="button" class="scan-popup-close" id="scan-popup-close-btn" onclick="closeScanPopup()">
        <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        <span class="visually-hidden" data-i18n="scan_popup_close">Schließen</span>
      </button>
    </div>
    <div class="scan-skin">
      <canvas id="s-capture-canvas"></canvas>
      <input type="file" id="s-file-camera" accept="image/*" capture="environment" />
      <input type="file" id="s-file-gallery" accept="image/*" />
      <div class="toast" id="s-toast"></div>

      <header class="scan-toolbar">
        <div class="header-left">
          <button type="button" class="back-link" data-i18n="scan_back" onclick="closeScanPopup()">Home</button>
          <div class="header-divider" aria-hidden="true"></div>
          <img src="/logo-white.svg" alt="Dominicano Express" class="scan-logo-img" width="160" height="28" />
          <div class="header-badge">
            <svg class="badge-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="5" width="18" height="14" rx="2"/>
              <circle cx="8" cy="11" r="2"/>
              <path d="M14 9h4M14 13h3"/>
            </svg>
            <span data-i18n="header_scanner">ID Scanner</span>
          </div>
        </div>
        <div class="header-right">
          <div class="auto-toggle on" id="s-auto-toggle" onclick="toggleAutoMode()">
            <div class="auto-toggle-dot"></div>
            <span data-i18n="scan_auto">Auto</span>
          </div>
          <div class="ocr-pill">
            <div class="ocr-pill-dot" id="s-status-dot"></div>
            <span id="s-status-text">Ready</span>
          </div>
        </div>
      </header>

      <main class="scan-main">
        <div class="scanner-card">
          <div class="scanner-area"
               id="s-drop-zone"
               ondragover="handleDragOver(event)"
               ondragleave="handleDragLeave(event)"
               ondrop="handleDrop(event)">

            <video id="s-camera-video" autoplay playsinline muted></video>
            <img id="s-captured-img" alt="" />

            <div class="drop-overlay" id="s-drop-overlay">
              <svg viewBox="0 0 24 24" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="5" width="20" height="15" rx="2"/>
                <circle cx="7.5" cy="11" r="2.5"/>
                <path d="M2 19l5.5-6L12 17l3.5-4L22 19"/>
              </svg>
              <div class="drop-overlay-title" data-i18n="scan_drop_title">Passport · ID</div>
              <div class="drop-overlay-sub" data-i18n="scan_drop_sub">…</div>
            </div>

            <div class="scan-frame" id="s-scan-frame" style="display:none">
              <div class="scan-corner tl"></div><div class="scan-corner tr"></div>
              <div class="scan-corner bl"></div><div class="scan-corner br"></div>
            </div>

            <div class="auto-hud" id="s-auto-hud">
              <div class="countdown-ring" id="s-countdown-ring">
                <svg viewBox="0 0 38 38">
                  <circle class="ring-track" cx="19" cy="19" r="16.5"/>
                  <circle class="ring-fill" cx="19" cy="19" r="16.5" id="s-ring-fill"/>
                </svg>
                <span class="ring-icon">📷</span>
              </div>
              <div class="sharp-bar-wrap"><div class="sharp-bar" id="s-sharp-bar"></div></div>
              <span class="auto-status" id="s-auto-status" data-i18n="scan_hold_frame">…</span>
            </div>

            <div class="processing-overlay" id="s-proc-overlay">
              <div class="spinner"></div>
              <div class="proc-label" id="s-proc-label">…</div>
              <div class="proc-bar-wrap"><div class="proc-bar" id="s-proc-bar"></div></div>
            </div>
          </div>

          <div class="scan-hint-strip">
            <span class="scan-hint-text" id="s-scan-hint" data-i18n="scan_hint_default">…</span>
            <button class="btn-new-scan" id="s-reset-btn" onclick="resetScan()">
              <svg viewBox="0 0 24 24" width="13" height="13" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
              <span data-i18n="scan_new_scan">…</span>
            </button>
          </div>

          <div class="scanner-dock">
            <button class="btn-dock-icon" onclick="uploadGallery()">
              <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <span data-i18n="scan_gallery">…</span>
            </button>
            <button class="btn-scan" id="s-capture-btn" onclick="captureFromCamera()">
              <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3.5"/>
                <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
              </svg>
            </button>
            <button class="btn-dock-icon" onclick="takePhoto()">
              <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
              <span data-i18n="scan_photo">…</span>
            </button>
          </div>
        </div>

        <div id="s-results-section">
          <div class="divider"></div>
          <div class="section-header">
            <span class="section-title" data-i18n="scan_detected_doc">…</span>
          </div>
          <div class="doc-summary results-animate">
            <div class="doc-thumb"><img id="s-thumb-img" alt="" /></div>
            <div class="doc-meta">
              <div class="doc-type-label" id="s-doc-type-label">—</div>
              <div class="doc-country" id="s-doc-country-label">—</div>
              <div class="doc-badges" id="s-doc-badges"></div>
            </div>
            <div class="action-row">
              <button class="btn-copy-all" id="s-copy-all-btn" onclick="copyAll()">
                <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2"/>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
                <span data-i18n="scan_copy_all">…</span>
              </button>
            </div>
          </div>

          <div class="section-header">
            <span class="section-title" data-i18n="scan_fields">…</span>
          </div>
          <div class="fields-grid results-animate" id="s-fields-grid"></div>

          <div class="mrz-card results-animate" id="s-mrz-card" style="display:none">
            <div class="mrz-label" data-i18n="scan_mrz">MRZ</div>
            <div id="s-mrz-lines"></div>
          </div>

          <div class="export-card results-animate">
            <div class="export-header">
              <span class="export-title" data-i18n="scan_export">…</span>
              <button class="btn-sm" onclick="copyExport()" data-i18n="scan_copy">Copy</button>
            </div>
            <textarea id="s-export-textarea" readonly spellcheck="false"></textarea>
          </div>

          <div class="raw-card results-animate">
            <div class="raw-header" onclick="toggleRaw(this)">
              <span class="raw-title" data-i18n="scan_raw">…</span>
              <svg class="raw-chevron" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="raw-body" id="s-raw-body">
              <div class="raw-text" id="s-raw-text"></div>
            </div>
          </div>
        </div>
      </main>

      <footer class="scan-footer">
        <div class="scan-footer-brand">
          <img src="/logo-white.svg" alt="Dominicano Express" class="scan-footer-logo" width="130" height="22" />
          <span class="scan-footer-text" data-i18n="scan_footer_brand">…</span>
        </div>
        <a href="/datenschutz" class="scan-footer-link" data-i18n="footer_privacy">Datenschutz</a>
      </footer>
    </div>
  </div>
</div>

<script>
(function () {
  var _open = false;
  function rootEl() { return document.getElementById('scan-popup-root'); }

  window.openScanPopup = function () {
    var r = rootEl();
    if (!r || _open) return;
    _open = true;
    r.hidden = false;
    r.setAttribute('aria-hidden', 'false');
    r.classList.add('is-open');
    document.body.classList.add('scan-popup-open');
    history.replaceState(null, '', '#scanner');
    requestAnimationFrame(function () {
      var b = document.getElementById('scan-popup-close-btn');
      if (b) b.focus();
      if (typeof window.refreshScanChrome === 'function') window.refreshScanChrome();
    });
  };

  window.closeScanPopup = function () {
    var r = rootEl();
    if (!r || !_open) return;
    _open = false;
    r.classList.remove('is-open');
    r.setAttribute('aria-hidden', 'true');
    r.hidden = true;
    document.body.classList.remove('scan-popup-open');
    if (location.hash === '#scanner') {
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }
    try { if (typeof resetScan === 'function') resetScan(); } catch (e) {}
  };

  document.addEventListener('click', function (e) {
    var a = e.target.closest('a[href="#scanner"]');
    if (!a) return;
    e.preventDefault();
    openScanPopup();
    var mn = document.getElementById('mobile-nav');
    if (mn && mn.classList.contains('open')) {
      if (typeof toggleMenu === 'function') toggleMenu();
    }
  });

  document.getElementById('scan-popup-backdrop')?.addEventListener('click', function () {
    closeScanPopup();
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && _open) {
      e.preventDefault();
      closeScanPopup();
    }
  });

  window.addEventListener('load', function () {
    if (location.hash === '#scanner') openScanPopup();
  });

  window.addEventListener('hashchange', function () {
    if (location.hash === '#scanner' && !_open) openScanPopup();
  });
})();
</script>
