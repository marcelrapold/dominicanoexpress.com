<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ID Scanner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f1f5f9;
      --surface: #ffffff;
      --border:  #e2e8f0;
      --blue:    #2563eb;
      --blue-lt: #eff6ff;
      --blue-dk: #1d4ed8;
      --green:   #16a34a;
      --green-lt:#f0fdf4;
      --red:     #dc2626;
      --red-lt:  #fef2f2;
      --amber:   #d97706;
      --text:    #0f172a;
      --muted:   #64748b;
      --radius:  10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100dvh;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--blue); display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 18px; height: 18px; stroke: #fff; fill: none; }
    .logo-name { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
    .logo-sub  { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .ocr-pill {
      padding: 4px 10px; border-radius: 99px;
      font-size: 11px; font-weight: 600; letter-spacing: .3px;
      border: 1px solid var(--border); color: var(--muted);
      display: flex; align-items: center; gap: 5px;
    }
    .ocr-pill-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
    .ocr-pill-dot.ready  { background: var(--green); }
    .ocr-pill-dot.busy   { background: var(--amber); animation: blink .7s ease infinite alternate; }
    @keyframes blink { to { opacity: .2; } }

    /* ── Main layout ──────────────────────────────────────────────────────── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 64px;
    }

    /* ── Scanner card ─────────────────────────────────────────────────────── */
    .scanner-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .scanner-area {
      position: relative;
      aspect-ratio: 16/9;
      background: #0f172a;
      overflow: hidden;
    }
    @media (max-width: 600px) { .scanner-area { aspect-ratio: 4/3; } }

    #camera-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #captured-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      background: #0f172a;
      display: none;
    }

    .drop-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: #0f172a;
      color: #94a3b8;
    }
    .drop-overlay svg { width: 48px; height: 48px; stroke: currentColor; fill: none; opacity: .4; }
    .drop-overlay p { font-size: 14px; opacity: .6; text-align: center; line-height: 1.6; }
    .drop-overlay.drag-active { background: #172554; }
    .drop-overlay.drag-active p::before { content: 'Loslassen zum Scannen'; display: block; color: #60a5fa; font-weight: 600; font-size: 16px; }

    /* scan frame corners */
    .scan-frame {
      position: absolute; inset: 16px;
      pointer-events: none;
    }
    .scan-corner {
      position: absolute;
      width: 24px; height: 24px;
      border-color: rgba(37,99,235,.8);
      border-style: solid;
    }
    .scan-corner.tl { top: 0; left: 0; border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
    .scan-corner.tr { top: 0; right: 0; border-width: 2px 2px 0 0; border-radius: 0 3px 0 0; }
    .scan-corner.bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; border-radius: 0 0 0 3px; }
    .scan-corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }

    /* processing overlay */
    .processing-overlay {
      position: absolute; inset: 0;
      background: rgba(15,23,42,.85);
      backdrop-filter: blur(4px);
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    .processing-overlay.active { display: flex; }
    .spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: var(--blue);
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .proc-label { color: #f1f5f9; font-size: 14px; font-weight: 500; }
    .proc-bar-wrap { width: 200px; height: 3px; border-radius: 2px; background: rgba(255,255,255,.15); }
    .proc-bar { height: 100%; border-radius: 2px; background: var(--blue); width: 0; transition: width .3s; }

    /* scanner toolbar */
    .scanner-toolbar {
      padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
      border-top: 1px solid var(--border);
    }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      transition: all .15s; white-space: nowrap;
    }
    .btn:hover { background: var(--bg); }
    .btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; flex-shrink: 0; }
    .btn-primary {
      background: var(--blue); color: #fff; border-color: var(--blue);
    }
    .btn-primary:hover { background: var(--blue-dk); border-color: var(--blue-dk); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .scan-hint-text { flex: 1; font-size: 12px; color: var(--muted); }

    /* ── Upload bar ───────────────────────────────────────────────────────── */
    .upload-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
    }
    .upload-bar-label { font-size: 13px; color: var(--muted); flex: 1; }

    /* ── Results ──────────────────────────────────────────────────────────── */
    #results-section { display: none; }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .8px;
      color: var(--muted);
    }

    /* doc summary card */
    .doc-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 16px;
    }
    .doc-thumb {
      width: 80px; height: 56px;
      border-radius: 6px; overflow: hidden;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .doc-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .doc-meta { flex: 1; min-width: 0; }
    .doc-type-label { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .doc-country { font-size: 13px; color: var(--muted); }
    .doc-badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .badge {
      font-size: 11px; font-weight: 600; padding: 3px 9px;
      border-radius: 99px; border: 1px solid;
    }
    .badge-green { background: var(--green-lt); color: var(--green); border-color: #bbf7d0; }
    .badge-blue  { background: var(--blue-lt);  color: var(--blue);  border-color: #bfdbfe; }
    .badge-red   { background: var(--red-lt);   color: var(--red);   border-color: #fecaca; }
    .badge-gray  { background: var(--bg);       color: var(--muted); border-color: var(--border); }

    /* fields grid */
    .fields-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .field-cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 2px;
      position: relative;
      transition: border-color .15s;
    }
    .field-cell:hover { border-color: #93c5fd; }
    .field-cell.full { grid-column: 1 / -1; }
    .field-cell-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .6px;
      color: var(--muted);
    }
    .field-cell-value {
      font-size: 15px; font-weight: 600;
      color: var(--text);
      word-break: break-word;
    }
    .field-cell-value.mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; letter-spacing: .5px; }
    .copy-icon {
      position: absolute; top: 8px; right: 8px;
      width: 26px; height: 26px; border-radius: 6px;
      background: transparent; border: 1px solid transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted);
      transition: all .15s; opacity: 0;
    }
    .field-cell:hover .copy-icon { opacity: 1; }
    .copy-icon:hover { background: var(--blue-lt); border-color: #bfdbfe; color: var(--blue); }
    .copy-icon.done  { background: var(--green-lt); border-color: #bbf7d0; color: var(--green); opacity: 1; }
    .copy-icon svg { width: 13px; height: 13px; stroke: currentColor; fill: none; }

    /* MRZ */
    .mrz-card {
      background: #0f172a;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .mrz-label { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: #475569; margin-bottom: 8px; }
    .mrz-line  { font-family: 'SF Mono', 'Courier New', monospace; font-size: 12px; color: #60a5fa; letter-spacing: 2px; line-height: 1.9; word-break: break-all; }

    /* export */
    .export-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .export-header {
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .export-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
    #export-textarea {
      width: 100%; border: none; outline: none; resize: none;
      font-family: 'SF Mono', 'Courier New', monospace;
      font-size: 12px; color: var(--muted); line-height: 1.8;
      padding: 14px 16px; height: 180px; background: transparent;
    }

    /* action row */
    .action-row {
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    /* raw OCR */
    .raw-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
    }
    .raw-header {
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
      background: var(--bg);
    }
    .raw-header:hover { background: var(--border); }
    .raw-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
    .raw-chevron { transition: transform .2s; }
    .raw-chevron.open { transform: rotate(180deg); }
    .raw-body { display: none; padding: 14px 16px; }
    .raw-body.open { display: block; }
    .raw-text { font-family: 'SF Mono', 'Courier New', monospace; font-size: 11px; color: var(--muted); line-height: 1.8; white-space: pre-wrap; word-break: break-word; max-height: 240px; overflow-y: auto; }

    /* toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: #f8fafc;
      padding: 10px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
      opacity: 0; transition: opacity .2s;
      pointer-events: none; white-space: nowrap;
      z-index: 999;
    }
    .toast.show { opacity: 1; }

    /* divider */
    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    /* hidden inputs */
    input[type=file] { display: none; }
    canvas { display: none; }

    /* responsive */
    @media (max-width: 480px) {
      .fields-grid { grid-template-columns: 1fr 1fr; }
      .doc-summary { flex-direction: column; align-items: flex-start; }
      .doc-thumb { width: 100%; height: 100px; }
      .doc-thumb img { width: 100%; height: 100%; object-fit: cover; }
    }
  </style>
</head>
<body>

<canvas id="capture-canvas"></canvas>
<input type="file" id="file-camera"  accept="image/*" capture="environment" />
<input type="file" id="file-gallery" accept="image/*" />
<div class="toast" id="toast"></div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="5" width="18" height="14" rx="2"/>
        <circle cx="8" cy="11" r="2"/>
        <path d="M14 9h4M14 13h3"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">ID Scanner</div>
      <div class="logo-sub">Dokumentenerkennung</div>
    </div>
  </div>
  <div class="header-right">
    <div class="ocr-pill">
      <div class="ocr-pill-dot" id="status-dot"></div>
      <span id="status-text">Bereit</span>
    </div>
  </div>
</header>

<!-- Main -->
<main>

  <!-- Scanner -->
  <div class="scanner-card">
    <div class="scanner-area"
         id="drop-zone"
         ondragover="handleDragOver(event)"
         ondragleave="handleDragLeave(event)"
         ondrop="handleDrop(event)">

      <video id="camera-video" autoplay playsinline muted></video>
      <img  id="captured-img" alt="Aufnahme" />

      <!-- Drop / idle overlay -->
      <div class="drop-overlay" id="drop-overlay">
        <svg viewBox="0 0 24 24" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5" width="20" height="15" rx="2"/>
          <circle cx="7.5" cy="11" r="2.5"/>
          <path d="M2 19l5.5-6L12 17l3.5-4L22 19"/>
        </svg>
        <p>Ausweis · Reisepass · Führerschein<br/>Kamera starten oder Bild hierher ziehen</p>
      </div>

      <!-- Scan corners (shown when camera active) -->
      <div class="scan-frame" id="scan-frame" style="display:none">
        <div class="scan-corner tl"></div>
        <div class="scan-corner tr"></div>
        <div class="scan-corner bl"></div>
        <div class="scan-corner br"></div>
      </div>

      <!-- Processing -->
      <div class="processing-overlay" id="proc-overlay">
        <div class="spinner"></div>
        <div class="proc-label" id="proc-label">Verarbeite…</div>
        <div class="proc-bar-wrap"><div class="proc-bar" id="proc-bar"></div></div>
      </div>
    </div>

    <div class="scanner-toolbar">
      <button class="btn btn-primary" id="capture-btn" onclick="captureFromCamera()">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
        </svg>
        Scannen
      </button>
      <button class="btn" onclick="document.getElementById('file-gallery').click()">
        <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Hochladen
      </button>
      <button class="btn" onclick="document.getElementById('file-camera').click()">
        <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Foto aufnehmen
      </button>
      <span class="scan-hint-text" id="scan-hint">Karte vollständig im Bild halten</span>
      <button class="btn btn-sm" id="reset-btn" onclick="resetScan()" style="display:none">↺ Neu</button>
    </div>
  </div>

  <!-- Results -->
  <div id="results-section">
    <div class="divider"></div>

    <!-- Doc summary -->
    <div class="section-header">
      <span class="section-title">Erkanntes Dokument</span>
    </div>
    <div class="doc-summary">
      <div class="doc-thumb"><img id="thumb-img" alt="" /></div>
      <div class="doc-meta">
        <div class="doc-type-label" id="doc-type-label">—</div>
        <div class="doc-country" id="doc-country-label">—</div>
        <div class="doc-badges" id="doc-badges"></div>
      </div>
      <div class="action-row">
        <button class="btn btn-primary" id="copy-all-btn" onclick="copyAll()">
          <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Alles kopieren
        </button>
      </div>
    </div>

    <!-- Fields -->
    <div class="section-header">
      <span class="section-title">Extrahierte Felder</span>
    </div>
    <div class="fields-grid" id="fields-grid"></div>

    <!-- MRZ -->
    <div class="mrz-card" id="mrz-card" style="display:none">
      <div class="mrz-label">Maschinenlesbare Zone · MRZ</div>
      <div id="mrz-lines"></div>
    </div>

    <!-- Export -->
    <div class="export-card">
      <div class="export-header">
        <span class="export-title">Export · Plaintext</span>
        <button class="btn btn-sm" onclick="copyExport()">Kopieren</button>
      </div>
      <textarea id="export-textarea" readonly spellcheck="false"></textarea>
    </div>

    <!-- Raw OCR -->
    <div class="raw-card">
      <div class="raw-header" onclick="toggleRaw(this)">
        <span class="raw-title">Roh-OCR Text</span>
        <svg class="raw-chevron" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="raw-body" id="raw-body">
        <div class="raw-text" id="raw-text"></div>
      </div>
    </div>
  </div>

</main>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const OCR_KEY = 'helloworld'; // ocr.space free key – get own at ocr.space/ocrapi
const OCR_URL = 'https://api.ocr.space/parse/image';

// ── State ───────────────────────────────────────────────────────────────────
let stream      = null;
let capturedURL = null;
let cameraActive = false;

// ── Init ────────────────────────────────────────────────────────────────────
setStatus('ready', 'Bereit');
document.getElementById('file-gallery').addEventListener('change', e => { onFile(e.target.files[0]); e.target.value=''; });
document.getElementById('file-camera') .addEventListener('change', e => { onFile(e.target.files[0]); e.target.value=''; });

// ── Camera ──────────────────────────────────────────────────────────────────
async function captureFromCamera() {
  const video = document.getElementById('camera-video');

  // Already streaming → capture frame
  if (cameraActive && video.readyState >= 2 && video.videoWidth > 0) {
    const canvas = document.getElementById('capture-canvas');
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    capturedURL = canvas.toDataURL('image/jpeg', 0.95);
    runOCR(capturedURL);
    return;
  }

  // Start camera
  if (!navigator.mediaDevices?.getUserMedia) {
    document.getElementById('file-camera').click(); return;
  }

  const tries = [
    { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } },
    { video: { facingMode: 'environment' } },
    { video: true }
  ];
  for (const c of tries) {
    try {
      stream = await navigator.mediaDevices.getUserMedia(c);
      video.srcObject = stream;
      video.style.display = 'block';
      document.getElementById('drop-overlay').style.display = 'none';
      document.getElementById('scan-frame').style.display = 'block';
      document.getElementById('scan-hint').textContent = 'Kamera aktiv · Karte ausrichten und Scannen drücken';
      cameraActive = true;
      return;
    } catch (_) {}
  }
  document.getElementById('file-camera').click();
}

// ── File / Drop ──────────────────────────────────────────────────────────────
function onFile(file) {
  if (!file?.type?.startsWith('image/')) { toast('Bitte ein Bild auswählen'); return; }
  const reader = new FileReader();
  reader.onload = ev => runOCR(ev.target.result);
  reader.readAsDataURL(file);
}

function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('drop-overlay').classList.add('drag-active');
}
function handleDragLeave() {
  document.getElementById('drop-overlay').classList.remove('drag-active');
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-overlay').classList.remove('drag-active');
  onFile(e.dataTransfer?.files?.[0]);
}

// ── OCR pipeline ─────────────────────────────────────────────────────────────
async function runOCR(dataURL) {
  capturedURL = dataURL;

  // Show captured image
  const img = document.getElementById('captured-img');
  img.src = dataURL;
  img.style.display = 'block';
  document.getElementById('camera-video').style.display = 'none';
  document.getElementById('drop-overlay').style.display = 'none';
  document.getElementById('scan-frame').style.display = 'none';
  document.getElementById('reset-btn').style.display = 'inline-flex';

  // Stop camera stream
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; cameraActive = false; }

  // Show processing
  const overlay = document.getElementById('proc-overlay');
  overlay.classList.add('active');
  setProc('Bild optimieren…', 10);
  setStatus('busy', 'OCR läuft…');
  document.getElementById('capture-btn').disabled = true;

  try {
    const compressed = await compressImage(dataURL, 900 * 1024);
    setProc('Sende an OCR-Server…', 35);

    const text = await callOCR(compressed);
    setProc('Felder extrahieren…', 80);

    const fields = extractFields(text);
    setProc('Fertig', 100);

    await delay(300);
    overlay.classList.remove('active');
    renderResults(fields, text, dataURL);
    setStatus('ready', 'Abgeschlossen');

  } catch (e) {
    overlay.classList.remove('active');
    toast('Fehler: ' + errStr(e), true);
    setStatus('ready', 'Fehler');
    console.error(e);
  }

  document.getElementById('capture-btn').disabled = false;
}

// ── OCR.space call ───────────────────────────────────────────────────────────
async function callOCR(dataURL) {
  const body = new URLSearchParams({
    base64Image: dataURL,
    language: 'ger',
    OCREngine: '2',
    scale: 'true',
    detectOrientation: 'true',
    isOverlayRequired: 'false'
  });
  const res = await fetch(OCR_URL, { method: 'POST', headers: { apikey: OCR_KEY }, body });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  if (json.IsErroredOnProcessing) throw new Error(json.ErrorMessage?.[0] || 'API Fehler');
  if (!json.ParsedResults?.length) throw new Error('Kein Text erkannt');
  return json.ParsedResults.map(r => r.ParsedText || '').join('\n');
}

// ── Image compression ─────────────────────────────────────────────────────────
function compressImage(dataURL, maxBytes) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const s = Math.min(1, 1400 / img.width);
      canvas.width = Math.round(img.width * s);
      canvas.height = Math.round(img.height * s);
      const ctx = canvas.getContext('2d');
      try { ctx.filter = 'grayscale(100%) contrast(150%) brightness(108%)'; } catch (_) {}
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      let q = 0.88, out = canvas.toDataURL('image/jpeg', q);
      while (out.length * 0.75 > maxBytes && q > 0.3) { q -= 0.1; out = canvas.toDataURL('image/jpeg', q); }
      resolve(out);
    };
    img.onerror = () => resolve(dataURL);
    img.src = dataURL;
  });
}

// ── Field extraction ──────────────────────────────────────────────────────────
function extractFields(raw) {
  const f = {};
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const txt = raw;

  // ── MRZ detection ────────────────────────────────────────────────────────
  const mrzCandidates = lines
    .map(l => l.toUpperCase().replace(/[^A-Z0-9<]/g, ''))
    .filter(l => l.length >= 28 && (l.match(/</g)||[]).length >= 2);

  if (mrzCandidates.length >= 2) {
    const mrz = parseMRZ(mrzCandidates);
    if (mrz) Object.assign(f, mrz);
  }
  f._mrz = mrzCandidates.length >= 2 ? mrzCandidates.slice(0, 3) : null;

  // ── Label-based extraction (works for passports with multilingual labels) ──
  const after = (label, fallback) => {
    // Look for text after a label on the same or next line
    const re = new RegExp(label + '[^\\n]{0,60}\\n([^\\n]+)', 'i');
    const m = txt.match(re);
    return m ? m[1].replace(/[▲◄►▼▸◂]/g, '').trim() : fallback;
  };

  // Surname
  if (!f.surname) {
    const s = after('(?:Surname|Name\\s*·|Nom\\s*·|Cognome|Nachname)');
    if (s && s.length < 50) f.surname = s;
  }

  // Given names
  if (!f.givenNames) {
    const g = after('(?:Given name|Vorname|Prénom|Nome\\s*i|Prenum)');
    if (g && g.length < 80) f.givenNames = g;
  }

  // Nationality
  if (!f.nationality) {
    const n = after('(?:Nationality|Nationalit|Naziunalitad|Staatsangehörigkeit)');
    if (n && n.length < 60) f.nationality = n;
  }

  // Date of birth
  if (!f.dob) {
    const dobMatch = txt.match(/(?:Date of birth|Geburtsdatum|Naissance|Data di nascita)[^\n]{0,60}\n?\s*(\d{1,2}[\s./-]\d{2}[\s./-]\d{4})/i);
    if (dobMatch) f.dob = normalizeDate(dobMatch[1]);
  }

  // Date of issue
  const issueMatch = txt.match(/(?:Date of issue|Ausgestellt|D[eé]livr[eé]|Rilasciato|Emess ils)[^\n]{0,60}\n?\s*(\d{1,2}[\s./-]\d{2}[\s./-]\d{4})/i);
  if (issueMatch) f.issued = normalizeDate(issueMatch[1]);

  // Expiry
  if (!f.expiry) {
    const expMatch = txt.match(/(?:Date of expiry|Gültig bis|Expiration|Scadenza|Data da scadenza)[^\n]{0,60}\n?\s*(\d{1,2}[\s./-]\d{2}[\s./-]\d{4})/i);
    if (expMatch) f.expiry = normalizeDate(expMatch[1]);
  }

  // Sex / Geschlecht
  if (!f.sex) {
    const sexMatch = txt.match(/(?:Sex|Geschlecht|Sexe|Sesso|Schlattaina)[^\n]{0,30}\n?\s*([MFmf])\b/i);
    if (sexMatch) f.sex = sexMatch[1].toUpperCase();
  }

  // Height / Grösse
  const htMatch = txt.match(/(\d{3})\s*cm/i);
  if (htMatch) f.height = htMatch[1] + ' cm';

  // Place of origin / Heimatort
  const heimatMatch = txt.match(/(?:Heimatort|Lieu d.origine|Place of origin|Luogo di attinenza)[^\n]{0,40}\n([^\n]{2,40})/i);
  if (heimatMatch) f.placeOfOrigin = heimatMatch[1].replace(/[▲◄►▼▸◂•]/g, '').trim();

  // Authority / Behörde
  const authMatch = txt.match(/(?:Beh[öo]rde|Autorit[eéa]|Authority|Autoritad)[^\n]{0,40}\n([^\n]{2,50})/i);
  if (authMatch) f.authority = authMatch[1].replace(/[▲◄►▼▸◂•]/g, '').trim();

  // Document number fallback
  if (!f.docNumber) {
    const numMatch = txt.match(/\b([A-Z][A-Z0-9]{7,8})\b/);
    if (numMatch) f.docNumber = numMatch[1];
  }

  // DOB fallback — any date that looks like it
  if (!f.dob) {
    const dates = [...txt.matchAll(/\b(\d{1,2}[\s./-]\d{2}[\s./-]\d{4})\b/g)].map(m => normalizeDate(m[1]));
    if (dates[0]) f.dob = dates[0];
    if (dates[1] && !f.issued) f.issued = dates[1];
    if (dates[2] && !f.expiry) f.expiry = dates[2];
  }

  // Country code
  if (!f.country) {
    const cc = txt.match(/\b(DEU|CHE|AUT|USA|GBR|FRA|ITA|ESP|NLD|BEL|POL|TUR|CAN|AUS|CHN|JPN|BRA|MEX|IND)\b/);
    if (cc) f.country = cc[1];
  }

  return f;
}

// ── MRZ parser ────────────────────────────────────────────────────────────────
function parseMRZ(lines) {
  const cl = l => l.replace(/[^A-Z0-9<]/g, '');
  const L = lines.map(cl);
  const td3 = L.filter(l => l.length >= 42);
  if (td3.length >= 2 && /^P/.test(td3[0])) return parseTD3(td3[0], td3[1]);
  const td1 = L.filter(l => l.length >= 28);
  if (td1.length >= 3) return parseTD1(td1[0], td1[1], td1[2]);
  if (td1.length >= 2) return parseTD1(td1[0], td1[1], '');
  return null;
}
function parseTD1(l1, l2, l3) {
  return {
    docType: 'Personalausweis / ID',
    country: l1.substring(2,5).replace(/</g,''),
    docNumber: l1.substring(5,14).replace(/</g,''),
    dob: mrzDate(l2.substring(0,6)),
    sex: l2[7] === 'M' ? 'M' : l2[7] === 'F' ? 'F' : l2[7],
    expiry: mrzDate(l2.substring(8,14)),
    nationality: l2.substring(15,18).replace(/</g,''),
    surname: (l3.split('<<')[0]||'').replace(/</g,' ').trim(),
    givenNames: (l3.split('<<')[1]||'').replace(/</g,' ').trim()
  };
}
function parseTD3(l1, l2) {
  const ns = l1.substring(5).split('<<');
  return {
    docType: 'Reisepass',
    country: l1.substring(2,5).replace(/</g,''),
    surname: (ns[0]||'').replace(/</g,' ').trim(),
    givenNames: (ns[1]||'').replace(/</g,' ').trim(),
    docNumber: l2.substring(0,9).replace(/</g,''),
    nationality: l2.substring(10,13).replace(/</g,''),
    dob: mrzDate(l2.substring(13,19)),
    sex: l2[20] === 'M' ? 'M' : l2[20] === 'F' ? 'F' : l2[20],
    expiry: mrzDate(l2.substring(21,27))
  };
}
function mrzDate(s) {
  if (!s || s.length < 6 || s.includes('<')) return null;
  const yy = +s.slice(0,2), mm = +s.slice(2,4), dd = +s.slice(4,6);
  if (isNaN(yy+mm+dd)) return null;
  const yr = yy > 30 ? 1900+yy : 2000+yy;
  return `${String(dd).padStart(2,'0')}.${String(mm).padStart(2,'0')}.${yr}`;
}
function normalizeDate(s) {
  return s.trim().replace(/[\s/-]/g, '.').replace(/\.\.+/g, '.');
}

// ── Render results ────────────────────────────────────────────────────────────
const COUNTRY_MAP = {
  DEU:'Deutschland', CHE:'Schweiz', AUT:'Österreich', LIE:'Liechtenstein',
  USA:'USA', GBR:'Großbritannien', FRA:'Frankreich', ITA:'Italien',
  ESP:'Spanien', NLD:'Niederlande', BEL:'Belgien', POL:'Polen',
  TUR:'Türkei', CAN:'Kanada', AUS:'Australien', CHN:'China',
  JPN:'Japan', BRA:'Brasilien', MEX:'Mexiko', IND:'Indien', RUS:'Russland'
};

function renderResults(f, rawText, dataURL) {
  document.getElementById('results-section').style.display = 'block';

  // Thumb
  document.getElementById('thumb-img').src = dataURL;

  // Doc type & country
  document.getElementById('doc-type-label').textContent = f.docType || 'Unbekanntes Dokument';
  const ctry = f.country ? (COUNTRY_MAP[f.country] || f.country) + ' · ' + f.country : '';
  const nat  = f.nationality && f.nationality !== f.country ? (COUNTRY_MAP[f.nationality] || f.nationality) : '';
  document.getElementById('doc-country-label').textContent = [ctry, nat].filter(Boolean).join(' | ') || '—';

  // Badges
  const badges = document.getElementById('doc-badges');
  badges.innerHTML = '';
  const addBadge = (txt, cls) => {
    const b = document.createElement('span');
    b.className = 'badge ' + cls; b.textContent = txt;
    badges.appendChild(b);
  };
  if (f.docNumber) addBadge('Nr. ' + f.docNumber, 'badge-blue');
  if (f.expiry) {
    const exp = parseLocalDate(f.expiry);
    const valid = exp && exp > new Date();
    addBadge(valid ? 'Gültig bis ' + f.expiry : 'Abgelaufen ' + f.expiry, valid ? 'badge-green' : 'badge-red');
  }
  if (f.sex) addBadge(f.sex === 'M' ? 'Männlich' : f.sex === 'F' ? 'Weiblich' : f.sex, 'badge-gray');

  // Field cards
  const FIELD_DEFS = [
    { key:'surname',      label:'Nachname',           mono:false },
    { key:'givenNames',   label:'Vorname(n)',          mono:false },
    { key:'dob',          label:'Geburtsdatum',        mono:false },
    { key:'sex',          label:'Geschlecht',          mono:false, fmt: v => v==='M'?'Männlich':v==='F'?'Weiblich':v },
    { key:'nationality',  label:'Nationalität',        mono:false },
    { key:'country',      label:'Ausstellungsland',    mono:false, fmt: v => (COUNTRY_MAP[v]||v) + (COUNTRY_MAP[v]?' ('+v+')':'') },
    { key:'docNumber',    label:'Dokumentnummer',      mono:true  },
    { key:'docType',      label:'Dokumenttyp',         mono:false },
    { key:'issued',       label:'Ausstellungsdatum',   mono:false },
    { key:'expiry',       label:'Gültig bis',          mono:false },
    { key:'height',       label:'Körpergrösse',        mono:false },
    { key:'placeOfOrigin',label:'Heimatort / Herkunft',mono:false },
    { key:'authority',    label:'Ausstellungsbehörde', mono:false },
  ];

  const grid = document.getElementById('fields-grid');
  grid.innerHTML = '';
  FIELD_DEFS.forEach(def => {
    const raw = f[def.key];
    if (!raw) return;
    const val = def.fmt ? def.fmt(raw) : raw;
    const cell = document.createElement('div');
    cell.className = 'field-cell';
    cell.innerHTML = `
      <div class="field-cell-label">${def.label}</div>
      <div class="field-cell-value${def.mono?' mono':''}">${esc(val)}</div>
      <div class="copy-icon" onclick="copyField(this,'${esc(val)}')">
        <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </div>`;
    grid.appendChild(cell);
  });

  if (!grid.children.length) {
    grid.innerHTML = '<div class="field-cell full"><div class="field-cell-label">Hinweis</div><div class="field-cell-value">Keine strukturierten Felder erkannt – Roh-OCR-Text unten prüfen.</div></div>';
  }

  // MRZ
  if (f._mrz?.length >= 2) {
    document.getElementById('mrz-card').style.display = 'block';
    document.getElementById('mrz-lines').innerHTML = f._mrz.map(l => `<div class="mrz-line">${l}</div>`).join('');
  }

  // Export text
  document.getElementById('export-textarea').value = buildExport(f, rawText);

  // Raw OCR
  document.getElementById('raw-text').textContent = rawText;

  // Scroll to results
  document.getElementById('results-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Export builder ────────────────────────────────────────────────────────────
function buildExport(f, raw) {
  const pad = s => String(s).padEnd(22);
  const row = (k, v) => v ? pad(k + ':') + v + '\n' : '';
  return [
    '=== ID SCAN ERGEBNIS ===\n',
    row('Dokumenttyp',         f.docType),
    row('Ausstellungsland',    f.country ? (COUNTRY_MAP[f.country]||f.country) : null),
    row('Nachname',            f.surname),
    row('Vorname(n)',          f.givenNames),
    row('Geburtsdatum',        f.dob),
    row('Geschlecht',          f.sex === 'M' ? 'Männlich' : f.sex === 'F' ? 'Weiblich' : f.sex),
    row('Nationalität',        f.nationality),
    row('Dokumentnummer',      f.docNumber),
    row('Ausstellungsdatum',   f.issued),
    row('Gültig bis',          f.expiry),
    row('Körpergrösse',        f.height),
    row('Heimatort',           f.placeOfOrigin),
    row('Behörde',             f.authority),
    f._mrz ? '\n--- MRZ ---\n' + f._mrz.join('\n') + '\n' : ''
  ].join('');
}

// ── Copy helpers ──────────────────────────────────────────────────────────────
async function clip(text) {
  try { await navigator.clipboard.writeText(text); return true; }
  catch {
    const t = document.createElement('textarea');
    t.value = text; t.style.position='fixed'; t.style.opacity='0';
    document.body.appendChild(t); t.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(t); return ok;
  }
}
async function copyField(btn, text) {
  if (await clip(text)) {
    btn.classList.add('done');
    btn.innerHTML = '<svg viewBox="0 0 24 24" width="13" height="13" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>';
    setTimeout(() => {
      btn.classList.remove('done');
      btn.innerHTML = '<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    }, 2000);
    toast('Kopiert');
  }
}
async function copyAll() {
  const text = document.getElementById('export-textarea').value;
  if (await clip(text)) {
    const btn = document.getElementById('copy-all-btn');
    btn.textContent = '✓ Kopiert';
    setTimeout(() => btn.innerHTML = '<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;stroke:currentColor;fill:none;display:inline-block;vertical-align:-3px;margin-right:6px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Alles kopieren', 2500);
    toast('Alle Felder kopiert');
  }
}
async function copyExport() {
  if (await clip(document.getElementById('export-textarea').value)) toast('Export kopiert');
}

// ── Reset ─────────────────────────────────────────────────────────────────────
function resetScan() {
  document.getElementById('captured-img').style.display = 'none';
  document.getElementById('camera-video').style.display = 'none';
  document.getElementById('drop-overlay').style.display = 'flex';
  document.getElementById('scan-frame').style.display = 'none';
  document.getElementById('reset-btn').style.display = 'none';
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('mrz-card').style.display = 'none';
  document.getElementById('scan-hint').textContent = 'Karte vollständig im Bild halten';
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; cameraActive = false; }
  capturedURL = null;
  setStatus('ready', 'Bereit');
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function toggleRaw(header) {
  const body = document.getElementById('raw-body');
  const open = body.classList.toggle('open');
  header.querySelector('.raw-chevron').classList.toggle('open', open);
}
function setStatus(state, text) {
  document.getElementById('status-dot').className = 'ocr-pill-dot ' + (state === 'busy' ? 'busy' : 'ready');
  document.getElementById('status-text').textContent = text;
}
function setProc(text, pct) {
  document.getElementById('proc-label').textContent = text;
  document.getElementById('proc-bar').style.width = pct + '%';
}
let _tt; function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = err ? '#7f1d1d' : '#1e293b';
  t.classList.add('show'); clearTimeout(_tt);
  _tt = setTimeout(() => t.classList.remove('show'), 2500);
}
function errStr(e) { return e?.message || (typeof e==='string'?e:JSON.stringify(e)) || 'Unbekannt'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function parseLocalDate(s) {
  const p = s.split('.'); if (p.length!==3) return null;
  return new Date(+p[2], +p[1]-1, +p[0]);
}
